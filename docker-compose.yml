services:
  plexfm:
    container_name: plexfm
    build: .
    ports:
      - 3000:3000
    environment:
      - LAST_FM_API_KEY=<LastFM API Key>
      - LAST_FM_SHARED_SECRET=<Last FM Secret Key>
      - LAST_FM_SESSION_KEY=<Last FM Session Key>
      - WEBHOOK_API_KEY=<Random string you add to your webhook to pretend to authenticate it>
